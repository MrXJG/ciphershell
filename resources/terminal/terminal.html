<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="qrc:///terminal/xterm.css" />
    <style>
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #f8fafc;
      }
      #terminal-shell {
        width: 100%;
        height: 100%;
        padding: 10px 12px;
        box-sizing: border-box;
      }
      #terminal {
        width: 100%;
        height: 100%;
      }
      .xterm {
        height: 100%;
      }
      .xterm-viewport {
        scrollbar-color: #94a3b8 #f1f5f9;
      }
    </style>
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
    <script src="qrc:///terminal/xterm.js"></script>
    <script src="qrc:///terminal/xterm-addon-fit.js"></script>
  </head>
  <body>
    <div id="terminal-shell">
      <div id="terminal"></div>
    </div>
    <script>
      (() => {
        const term = new Terminal({
          cursorBlink: true,
          convertEol: true,
          fontFamily: 'Cascadia Mono, Consolas, SF Mono, Menlo, monospace',
          fontSize: 14,
          lineHeight: 1.2,
          scrollback: 5000,
          allowTransparency: true,
          theme: {
            background: '#f8fafc',
            foreground: '#111827',
            cursor: '#0f172a',
            selectionBackground: 'rgba(15, 23, 42, 0.18)'
          }
        });
        const fitAddon = new FitAddon.FitAddon();
        term.loadAddon(fitAddon);
        term.open(document.getElementById('terminal'));

        const encodeUtf8ToBase64 = (value) => {
          const bytes = new TextEncoder().encode(value);
          let raw = '';
          for (let i = 0; i < bytes.length; i += 1) {
            raw += String.fromCharCode(bytes[i]);
          }
          return btoa(raw);
        };

        const decodeBase64ToUtf8 = (value) => {
          const raw = atob(value);
          const bytes = new Uint8Array(raw.length);
          for (let i = 0; i < raw.length; i += 1) {
            bytes[i] = raw.charCodeAt(i);
          }
          return new TextDecoder().decode(bytes);
        };

        let bridge = null;

        const fitAndNotify = () => {
          fitAddon.fit();
          if (bridge && term.cols > 0 && term.rows > 0) {
            bridge.resizeTerminal(term.cols, term.rows);
          }
        };

        const refitSoon = () => {
          window.requestAnimationFrame(() => {
            fitAndNotify();
          });
        };

        window.gmsshWriteBase64 = (payload) => {
          term.write(decodeBase64ToUtf8(payload));
        };

        term.onData((data) => {
          if (bridge) {
            bridge.sendInputBase64(encodeUtf8ToBase64(data));
          }
        });

        term.onResize((size) => {
          if (bridge) {
            bridge.resizeTerminal(size.cols, size.rows);
          }
        });

        window.addEventListener('resize', refitSoon);

        new QWebChannel(qt.webChannelTransport, (channel) => {
          bridge = channel.objects.bridge;
          refitSoon();
          bridge.notifyReady();
        });

        if (document.fonts && document.fonts.ready) {
          document.fonts.ready.then(() => {
            refitSoon();
          });
        }
        setTimeout(refitSoon, 0);
      })();
    </script>
  </body>
</html>
